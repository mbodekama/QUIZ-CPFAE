# =============================================================================
#  QCM CPFAE — stack Docker « DEV » (local, HTTP)
#  Même principe que docker-compose.yml (prod) mais :
#    · Traefik en HTTP (entrypoint « web »), pas de TLS/Let's Encrypt
#    · Host fixe cpfae.localhost (résolu en 127.0.0.1 par Docker/host)
#    · Ports db/app exposés sur l'hôte pour le débogage direct
#  Réutilise le MÊME fichier .env (variables MYSQL_* et TRAEFIK_NETWORK).
#
#  Prérequis :  Traefik doit être DÉMARRÉ (docker start traefik)
#  Lancement :  docker compose -f docker-compose-dev.yml up -d --build
#  Accès     :  http://cpfae.localhost              (routé par Traefik, port 80)
#               http://localhost:3000/api/health    (API directe, debug)
#               localhost:3307                       (MySQL direct, debug)
# =============================================================================
name: cpfae-dev

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Accès direct à MySQL depuis l'hôte (client SQL, debug)
      - "3307:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    ports:
      # API accessible directement pour tester (curl localhost:3000/api/health)
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  web:
    build: ./frontend
    restart: unless-stopped
    # Pas de port hôte : on passe par Traefik (http://cpfae.localhost), comme
    # les autres projets. Publier un port ici entrerait en conflit avec le
    # dashboard Traefik (8080) et court-circuiterait le routage.
    depends_on:
      - app
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      # DEV : HTTP simple, host localhost, aucun TLS
      - "traefik.http.routers.cpfae-dev.rule=Host(`cpfae.localhost`)"
      - "traefik.http.routers.cpfae-dev.entrypoints=web"
      - "traefik.http.services.cpfae-dev.loadbalancer.server.port=80"

networks:
  # Réseau interne privé (app <-> db, web <-> app)
  internal:
  # Réseau Traefik existant sur l'hôte (créé hors de ce projet)
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}

volumes:
  db_data_dev:
