# Service « web » — nginx : sert la PWA (statique) et proxifie /api vers l'app.
# Traefik (sur l'hôte) route le trafic externe vers ce conteneur (port 80).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> backend Node/Express (nom de service docker « app »)
    location /api/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Le service worker et le manifeste ne doivent pas être mis en cache longtemps
    location = /sw.js            { add_header Cache-Control "no-cache"; }
    location = /registerSW.js    { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html       { add_header Cache-Control "no-cache"; }

    # Assets versionnés (hash dans le nom) : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
